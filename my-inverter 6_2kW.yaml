substitutions:
  device_name: "inverter"
  node_name: "My Inverter"
  inverter_name: "Inverter"
  inverter_tx_pin: GPIO17
  #GPIO5
  inverter_rx_pin: GPIO16
  #GPIO4
  inverter_voltage_offset: "0"
  update_interval: 2s # Minimum 10s recommended to avoid duplicate command errors
  select_skip_updates: "6"
  read_skip_updates: "6"

# uncomment if use PZEM 004 module
#  pzem_tx_pin: GPIO1
#  pzem_rx_pin: GPIO3
#  pzem_voltage_offset: "0"
#  pzem_current_offset: "0"
#  pzem_update_interval: 10s # Needs to be 1/5 of update interval because of smoothing filter on pzem readings


  jk_name: BMS
  #external_components_source: github://syssi/esphome-jk-bms@main
  #external_components_source1: https://github.com/syssi/esphome-jk-bms
  # Please use "JK02_24S" if you own a old JK-BMS < hardware version 11.0 (hardware version >= 6.0 and < 11.0)
  # Please use "JK02_32S" if you own a new JK-BMS >= hardware version 11.0 (f.e. JK-B2A8S20P hw 11.XW, sw 11.26)
  # Please use "JK04" if you have some old JK-BMS <= hardware version 3.0 (f.e. JK-B2A16S hw 3.0, sw. 3.3.0)
  protocol_version: JK02_32S

#external_components:
#  - source:
#      type: git
#      url: ${external_components_source1}
#      ref: main
#  - source: ${external_components_source}
#    refresh: 0s

esphome: 
  name: "${device_name}"
  friendly_name: "${node_name}"
  comment: "Monitor and control a PowMR solar inverter via modbus & JK-BMS v15,v19 via bluetooth"
  includes:
    - "helpers"
  project:
    name: "esphome.powmr-hybrid-inverter"
    version: 1.5.0

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
- platform: esphome
  password: !secret ota_password
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "My-Inverter Fallback Hotspot"
    password: !secret ap_password

captive_portal:

packages:
  # You can replace next 2 lines with your common configs for all devices
 # common_system: !include includes/common_system.yaml
  common_sensors: !include includes/common_sensors.yaml
  #jk_bms_v19: !include includes/esp32-ble-v19-example.yaml #BMS V19 sensors
  #jk_bms_v15: !include includes/esp32-ble-v15-example.yaml #BMS V15 sensors
  #pzem: !include includes/pzem.yaml # uncomment if use PZEM 004 module


logger:
  id: uart_logger
  baud_rate: 0
  level: DEBUG
  logs:
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO
    jk_bms_ble: INFO
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    number: INFO
    modbus_controller: DEBUG
    uart: DEBUG
  # logs:
  #   component: ERROR # Fix for issue #4717 "Component xxxxxx took a long time for an operation"



time:
  - platform: homeassistant
    id: hass_time

web_server:
 port: 80
 local: true
#  ota: false
  
uart:

  - id: uart_inverter
    baud_rate: 2400
    tx_pin: ${inverter_tx_pin}
    rx_pin: ${inverter_rx_pin}
    debug:
     direction: BOTH
     dummy_receiver: false
     after:
      delimiter: "\n"
     sequence:
      - lambda: UARTDebug::log_string(direction, bytes);
 
modbus:
  - id: modbus_inverter
    uart_id: uart_inverter
    send_wait_time: 500ms
  


modbus_controller:
  - id: smg_inverter
    address: 0x05
    modbus_id: modbus_inverter
    setup_priority: -10
    offline_skip_updates: 100
    #command_throttle: 1s
    update_interval: ${update_interval}
  


number:
  
  #Menu26 - 5027  Bulk charging voltage

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Menu 26: Bulk Charging Voltage"
    address: 5027
    register_type: holding
    force_new_range: true
    skip_updates: ${select_skip_updates}
    value_type: U_WORD
    unit_of_measurement: "V"
    entity_category: config
    min_value: 48
    max_value: 61
    step: 0.1
    mode: box
    lambda: |-
      return x / 10.0;
    write_lambda: |-
      return (uint16_t)(x * 10);

  #Menu27 - 5028 Floating charging voltage
  
  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Menu 27: Floating Charging Voltage"
    address: 5028
    register_type: holding
    force_new_range: true
    skip_updates: ${select_skip_updates}
    value_type: U_WORD
    unit_of_measurement: "V"
    entity_category: config
    min_value: 48
    max_value: 61
    step: 0.1
    mode: box
    lambda: |-
      return x / 10.0;
    write_lambda: |-
      return (uint16_t)(x * 10);

  #Menu28 - 5029 Low DC cut-off voltage
  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Menu 28: Low DC Cut-off Voltage"
    address: 5029
    register_type: holding
    force_new_range: true
    skip_updates: ${select_skip_updates}
    value_type: U_WORD
    unit_of_measurement: "V"
    entity_category: config
    min_value: 40
    max_value: 48
    step: 0.1
    mode: box
    lambda: |-
      return x / 10.0;
    write_lambda: |-
      return (uint16_t)(x * 10);

sensor:

  ###################################
  # Read first group (14 registers) #
  ###################################

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Grid Voltage"
    address: 4502
    register_type: holding
    #register_count: 14
    #force_new_range: true
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      return swapBytes(x);
    filters:
      - multiply: 0.1
     # - offset: ${inverter_voltage_offset}
     # - heartbeat: 10s

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Grid Frequency"
    address: 4503
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      return swapBytes(x);
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    id: PV_Voltage
    name: "${inverter_name} PV Voltage"
    address: 4504
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      return swapBytes(x);
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    id: PV_Power
    name: "${inverter_name} PV Power"
    address: 4505
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
     return swapBytes(x);

  - platform: template
    id: PV_Current
    name: "${inverter_name} PV Current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    update_interval: ${update_interval}
    lambda: |-
      if (id(PV_Voltage).state == 0) {
        return 0;
      }
      return id(PV_Power).state / id(PV_Voltage).state;
   # filters:
   #   - heartbeat: 10s

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Battery Voltage"
    id: battery_voltage
    address: 4506
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    lambda: |-
      return swapBytes(x);
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Battery SoC"
    accuracy_decimals: 0
    unit_of_measurement: "%"
    device_class: battery
    address: 4507
    register_type: holding
    value_type: U_WORD
    state_class: measurement
    lambda: |-
      return swapBytes(x);

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
    name: "${inverter_name} Battery Charge Current"
    id: battery_charge_current
    address: 4508
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      return swapBytes(x);

  - platform: modbus_controller
    modbus_controller_id: smg_inverter
